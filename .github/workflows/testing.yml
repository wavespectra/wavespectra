name: Build and test the library

on:
  push:

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    # Non-blocking for now: surfaces violations without failing the build.
    # Flip `continue-on-error` to false once the existing violations are cleaned up.
    continue-on-error: true
    steps:
    -
      name: Checkout repo
      uses: actions/checkout@v4
    -
      name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    -
      name: Install ruff
      run: python -m pip install ruff
    -
      name: Lint with ruff
      run: ruff check wavespectra tests
    -
      name: Check formatting with ruff
      run: ruff format --check wavespectra tests

  build-and-test:
    name: Build and test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
    -
      name: Checkout repo
      uses: actions/checkout@v4
    -
      name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
    -
      name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install . 'wavespectra[extra,test]'
    -
      name: Test package
      # --timeout guards against hangs (e.g. netCDF4/dask deadlocks): a stuck
      # test is killed with a thread dump instead of hanging the job for hours.
      run: pytest -s -v --timeout=300 --timeout-method=thread --cov=wavespectra --cov-report=xml --cov-report=term tests
    -
      name: Upload coverage to Coveralls
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
      uses: coverallsapp/github-action@v2
      with:
        file: coverage.xml
        format: cobertura
